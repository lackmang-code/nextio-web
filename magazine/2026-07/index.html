<!-- 카톡·SNS 미리보기 (Open Graph) -->
<meta property="og:type" content="article">
<meta property="og:title" content="성균관대학교 첨단디스플레이공학과 월간 Letter 창간호">
<meta property="og:description" content="창간 특집 · 투과 관점에서 본 OLED">
<meta property="og:image" content="표지썸네일.png">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script>
(function(){
  // 통합형 기기분기: 휴대폰 → phone.html / 그 외(PC·태블릿) → book.html
  var ua = navigator.userAgent || '';
  var mobileUA = /iPhone|iPod|Android.*Mobile|Windows Phone|BlackBerry|webOS|Mobile/i.test(ua);
  var w = Math.min(window.innerWidth || 9999, (window.screen && window.screen.width) || 9999);
  var goPhone = mobileUA || w <= 820;
  var target = (goPhone ? 'phone.html' : 'book.html') + (location.hash || '');
  location.replace(target);   // 뒤로가기에 진입점이 안 남도록 replace
})();
</script>
<style>
  html,body{height:100%;margin:0}
  body{display:flex;align-items:center;justify-content:center;background:#111;color:#fff;
       font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;text-align:center}
  .box{padding:24px;max-width:420px}
  .ttl{font-size:15px;letter-spacing:.3px;color:#ffd700;font-weight:700;margin-bottom:14px;line-height:1.5;word-break:keep-all}
  .sp{font-size:13px;color:#aaa;margin-bottom:22px}
  .links a{display:inline-block;margin:6px;padding:11px 20px;border:1px solid #ffd700;border-radius:8px;
           color:#ffd700;text-decoration:none;font-size:14px}
  .links a:active{background:#332b00}
</style>
</head>
<body>
  <!-- JS가 꺼졌거나 자동 이동 실패 시 보이는 수동 폴백 -->
  <div class="box">
    <div class="ttl">성균관대학교 첨단디스플레이공학과 월간 Letter 창간호</div>
    <div class="sp">기기에 맞는 화면으로 이동합니다…</div>
    <div class="links">
      <a href="book.html">💻 PC·펼침면으로 보기</a>
      <a href="phone.html">📱 모바일로 보기</a>
    </div>
  </div>
</body>
</html>
