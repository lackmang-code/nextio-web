const INTROS = [{"id":"head","label":"학과장 인사말","title":"학과장 인사말","portrait":"head.png","subtitle":"첨단디스플레이공학과 첨디공레터 창간과 더불어\n여러분의 지속적인 관심과 성원을 부탁드립니다.","signer":"첨단디스플레이공학과 송장근 학과장","body_md":"우리 첨단디스플레이공학과는 2024년 9월, 국내 최초의 정부지원 디스플레이 특성화 대학원으로 출범하여, 빠르게 변화하는 디스플레이 산업 환경 속에서 미래 기술을 선도할 핵심 인재를 양성하기 위한 체계적인 교육 및 연구 기반을 구축해 왔습니다. 디스플레이 산업은 단순한 시각 정보 전달을 넘어, 인간과 디지털 세계를 연결하는 핵심 인터페이스로 진화하고 있으며, 소재, 소자, 공정, 시스템, 그리고 AI까지 아우르는 융합적 접근이 필수적인 분야가 되었습니다.\n\n우리 학과는 OLED, micro-display, QDLED, 투명 디스플레이와 같은 차세대 디스플레이 기술뿐 아니라, AI for display, XR optics, flexible & stretchable electronics, oxide/LTPS TFT, DDI 및 영상처리 등 폭넓은 연구 분야를 포괄하는 교육과정을 운영하고 있습니다.\n\n특히, 삼성디스플레이와 LG디스플레이를 비롯한 60여 개 참여기업과의 긴밀한 산학협력 체계는 우리 학과의 가장 큰 강점 중 하나입니다. 여러분의 지속적인 관심과 성원을 부탁드립니다. 감사합니다."},{"id":"dean","label":"학장님 축사","title":"정보통신대학장 축사","portrait":"dean.png","subtitle":"첨단디스플레이공학과 첨디공레터의 창간을\n진심으로 축하드립니다.","signer":"정보통신대학 전정훈 학장","body_md":"정보통신대학은 빠르게 변화하는 기술 환경 속에서 미래 산업을 선도할 융합형 인재를 양성하는 것을 핵심 목표로 삼고 있으며, 이러한 관점에서 첨단디스플레이공학과의 출범과 성장은 매우 중요한 의미를 지니고 있습니다.\n\n첨단디스플레이공학과는 이러한 산업적·기술적 흐름에 선제적으로 대응하여, 정부 지원을 기반으로 한 체계적인 교육 프로그램과 산학협력 중심의 연구 환경을 구축하고 있습니다. 특히, 다수의 기업과 협력하여 실질적인 연구와 교육을 동시에 수행하는 모델은 정보통신대학이 지향하는 실용적이고 혁신적인 공학교육의 모범 사례라 할 수 있습니다.\n\n또한, 디스플레이 분야는 최근 메타버스, AI 기반 인터페이스 기술과 결합되면서 새로운 성장 국면에 진입하고 있습니다. 정보통신대학은 앞으로도 첨단디스플레이공학과가 글로벌 수준의 교육 및 연구 거점으로 성장할 수 있도록 적극적으로 지원할 것입니다.\n\n다시 한번 첨디공레터 창간을 진심으로 축하드립니다. 감사합니다."},{"id":"lab-kim-1","label":"연구실 소개","title":"김세정 교수 연구실<br>NoVA Lab","portrait":"prof_kim.png","subtitle":"Nanophotonics for Versatile Applications Laboratory","signer":"","body_md":"지난 2025년 9월에 부임한 전기전자공학부 김세정 교수 연구실은 빛을 이용한 소자 제작 및 물리 연구를 수행하고 있다. 이 연구실에서 진행 중인 연구는 크게 네 가지 분야로 나눌 수 있다.\n\n먼저 '광집적회로' 연구이다. 전자기기의 눈부신 발전은 전자집적회로(IC)의 등장과 집적도의 비약적인 향상에 기반하고 있다. 현재 우리가 사용하는 랩탑은 불과 수십 년 전의 슈퍼컴퓨터에 필적하는 성능을 구현할 수 있다. 그러나 전자회로의 근본적인 한계인 발열 문제와 무어의 법칙의 둔화로 인해, 광을 이용한 정보 처리 기술이 차세대 대안으로 부상하고 있다. 광집적회로는 전자회로와 결합하여 일부 기능을 대체하거나, 독립적인 정보처리 플랫폼으로 활용될 것으로 기대된다. 이러한 광집적회로 구현을 위해서는 전자를 대체하는 광원과 전선을 대신하는 광도파로 등 다양한 광소자가 필수적이다. 김세정 교수 연구실에서는 초소형 레이저, 광도파로, 광변조기 등 핵심 광소자의 설계 및 구현 연구를 수행하고 있다.\n\n광집적회로에서 한 단계 더 나아가, 최근에는 양자 광집적회로에 대한 관심이 크게 증가하고 있다. 양자광기술은 양자통신, 양자센싱 등 다양한 응용 가능성을 지니며, 김세정 교수 연구실에서는 특히 '양자 광원 개발'에 집중하고 있다. 이 중에서도 2차원 물질을 활용한 단광자원 소자 연구가 활발히 진행되고 있다. 단광자원은 광자를 하나씩 방출하는 특성을 가지며, 양자암호통신 및 초정밀 센싱에 핵심적으로 활용된다. 김세정 교수 연구실은 특히 2차원 상온 양자광원을 광공진기 및 광도파로와 결합한 사례를 세계 최초로 보고하였으며, 이를 기반으로 양자 광집적회로로의 확장을 추진하고 있다."},{"id":"lab-kim-2","label":"연구실 소개","title":"","portrait":"","feature_image":"prof_kim_lab.jpg","subtitle":"","signer":"","body_md":"세 번째로는 고차원 광자빔 연구이다. 광자가 정보 전달 매체로 활용될 때 가지는 중요한 장점 중 하나는 자유도가 매우 크다는 점이다. 전자의 경우 많음(HIGH, 1)과 적음(LOW, 0)의 이진 신호로 정보를 전달하는 반면, 광자는 파장, 편광, 위상, 각운동량 등 다양한 물리량을 활용하여 정보를 표현할 수 있다. 이는 하나의 채널을 통해 동시에 더 많은 정보를 전송할 수 있음을 의미한다. 김세정 교수 연구실에서는 특히 위상이 나선형으로 꼬인 구조를 갖는 광보텍스 연구가 활발히 진행되고 있다. 2025년에는 복굴절 물질을 활용하여 복잡한 공정 없이 광보텍스를 생성할 수 있는 방법을 제시하였으며(Light: Science & Applications, 2025), 이를 확장한 후속 연구가 진행 중이다. 또한 고차원 광자빔을 이용해 물질의 카이럴리티를 분석하는 Helical dichroism 연구는 바이오 및 제약 분야로의 응용 가능성을 보여주고 있다. 2026년 4월에는 광보텍스보다 더 복잡한 구조를 지닌 광스커미온을 역설계 기법을 통해 구현한 프로젝트를 완료했다.\n\n마지막으로 최근 새롭게 확장하고 있는 연구 분야로 AI 광학이 있다. 딥러닝에서 뉴런과 시냅스 가중치가 전기적 신호 연산으로 구현되는 것과 달리, 광학 시스템에서는 빛의 간섭, 회절, 위상 변조와 같은 물리 현상으로 동일한 연산을 초고속·병렬 수행할 수 있다. 이는 기존 전자 기반 AI 연산이 직면한 전력 소모 증가와 처리 속도 한계를 동시에 극복할 수 있는 유망한 대안으로 평가된다."},{"id":"lab-kim-3","label":"연구실 소개","title":"","portrait":"","feature_image":"prof_kim_work.jpg","subtitle":"","signer":"","body_md":"현재 연구실에서는 공간광변조기를 기반으로 연산 정확도와 속도를 향상시키는 연구를 진행 중이다. 나아가 이를 광집적회로 및 양자광학 플랫폼과 결합하여, 초고속·저전력 기반의 차세대 지능형 광정보처리 시스템으로 발전시키는 것을 목표로 한다.\n\n이러한 나노광학·광집적 기술은 차세대 디스플레이 분야에도 다양한 방식으로 활용될 수 있다. 예를 들어, 초소형 레이저와 광공진기 기반 광원 기술은 고해상도·고휘도 마이크로 LED 디스플레이의 핵심 요소로 적용될 수 있다. 또한 메타표면 및 위상 제어 기술은 얇고 가벼우면서도 높은 광효율을 가지는 AR/VR용 평면 광학소자(메타렌즈, 홀로그램 디스플레이) 구현에 기여할 수 있다. 나아가, 광자의 위상과 편광을 활용한 고차원 광자 제어 기술은 기존 디스플레이의 해상도 한계를 넘어서는 새로운 정보 표현 방식으로 확장될 가능성도 있다. 이러한 연구는 궁극적으로 초고해상도, 초박형, 저전력 특성을 동시에 만족하는 차세대 디스플레이 기술 개발로 이어질 수 있다."}];

const COVER_STORY = {"title": "OLED 패널을 투과(透過) 관점에서 보면", "image": "", "label": "첨디공의 廣角노트", "series": "📖 연재테마 ① · 투과(透過) 관점 시리즈", "pages": ["첨디공 廣角노트의 첫 번째 연재테마는 OLED 패널 뒤에서 동작하는 센서들과, 이들 센서와 직간접적으로 상관관계가 있는 OLED 패널의 투과정보·연동기술을 다룹니다. 백라이트가 필요한 LCD 패널에서 투과정보를 분석하는 것은 너무나 당연하지만, 전면발광 OLED 패널을 '투과의 관점'에서 분석하는 것은 꽤나 흥미롭습니다. 우리가 미처 생각하지 못한 이슈를 발견하게 되고, 나아가 새로운 차별화 기술 개발의 시발점이 될 수 있습니다.\n\n이번 호의 주인공은 OLED 뒤에 숨은 작은 눈, ALS(조도센서)입니다.\n\n<h3 style=\"font-size:1.1rem; color:#1A2A4A; margin-top:14px; margin-bottom:10px; border-bottom:2px solid #B08A2E; padding-bottom:3px; font-weight:700; margin-top:2px;\">1. ALS란 무엇인가?</h3>\n\n<div style=\"float:right; width:118px; margin:2px 0 6px 14px;\"><div class=\"figbox zoomable\" style=\"width:100%; height:286px;\"><img src=\"assets/als_chip.webp\" alt=\"ALS 센서 실물 단면\"><div class=\"zoom-hint\" style=\"font-size:8px; padding:2px 4px;\">🔍</div></div><div class=\"cap\" style=\"text-align:center; font-size:8.5px; margin:3px 0 0;\">▲ ALS 센서 실물 단면</div></div>\n\n화면 밝기를 알아서 맞춰 주는 그 눈을 조도센서(ALS, Ambient Light Sensor)라고 부릅니다. 그런데 ALS를 '밝기만 재는 센서'로 생각하면 절반만 아는 겁니다. 사실 ALS는 작은 컬러 카메라에 가깝습니다. 요즘 behind-OLED용 ALS는 Red·Green·Blue·Clear, 즉 RGB+C 네 채널을 동시에 읽습니다.\n\n이 네 채널의 조합에서 세 가지 정보를 뽑아냅니다.\n\n- 주변 밝기(조도, lux) — Clear 채널로 빛의 양을 잰다. 어두우면 화면을 낮춰 눈을 보호·절전하고, 밝으면 화면을 키운다.\n- 색온도(CCT) — RGB 채널 비율로 '햇빛인지·형광등인지·백열등인지'를 읽어 화이트밸런스·색감을 자동 조정한다.\n- 플리커(깜빡임) — 조명이 눈에 안 보이게 깜빡이는 주파수를 읽어 카메라 줄무늬(밴딩)를 막는다.\n\n즉 ALS는 주변광의 양·색·리듬을 한꺼번에 읽는 다채널 광센서입니다. 게다가 이 눈은 원래 베젤에 앉아 있었는데, '풀스크린' 시대가 오면서 자리를 잃고 화면 밑으로(behind-OLED) 숨어들어야 했습니다. 바로 그 순간부터, 이 이야기는 센서가 아니라 OLED의 이야기가 됩니다.", "<h3 style=\"font-size:1.1rem; color:#1A2A4A; margin-top:8px; margin-bottom:10px; border-bottom:2px solid #B08A2E; padding-bottom:3px; font-weight:700;\">2. ALS는 OLED와 어떻게 연동되는가?</h3>\n\n우리에겐 OLED가 스스로 빛을 내는 화려한 화면이지만, 그 아래 센서의 눈높이에서 보면 OLED는 여러 겹으로 쌓인 불투명한 막입니다. 외부광이 센서에 닿으려면 커버글라스·편광판·봉지막·화소층을 모두 투과해야 하는데, 화소와 금속 배선 사이 그물 같은 틈새로 새어드는 빛의 추정 투과율은 수 % 안팎에 불과합니다. 화소전극(Anode)은 전반사막이라 투과율이 zero에 가깝지만, 전극 사이 하부배선이 만든 미세한 그물망으로 빛이 새어 나갑니다. 그래서 ALS에게 가장 중요한 단어는 OLED의 투과특성입니다.\n\n<div class=\"figbox zoomable\" style=\"max-width:430px; height:223px; margin:10px auto 6px;\"><img src=\"assets/oled_refl_trans.webp\" alt=\"OLED 패널 반사·투과 이미지\"><div class=\"zoom-hint\">🔍 휠·더블클릭 확대</div></div>\n\n<p class=\"cap\" style=\"text-align:center;\">▲ 같은 OLED 패널을 반사(좌)·투과(우)로 본 실제 이미지 — 배선 사이로만 빛이 통과</p>\n\nOLED의 관점에서 보면, ALS가 풀어야 할 숙제는 셋이고, 셋 다 'OLED가 어떤 특성을 가져야 하는가'로 되돌아옵니다.\n\n① 투과 광량이 너무 약하다 → OLED는 더 투명해져야 한다. 1% 남짓의 빛으로 작동하려면 센서 감도만으론 한계가 있습니다. 화소 배치·캐소드 패턴·터치 전극 구조를 투과율이 높아지는 방향으로 설계하는 일이 OLED 개발자의 몫입니다.\n\n② OLED 빛 자체가 노이즈다. 센서 바로 위 화소는 영상에 맞춰 늘 변하는데, 이는 ALS 입장에선 최악의 잡음입니다. 그래서 디스플레이가 꺼지는 찰나(블랭킹 구간)에 맞춰 센싱해 순수 주변광만 취득합니다. 이를 위해 DDI는 발광 타이밍을 ALS에 전달해야 합니다.", "<div style=\"display:flex;align-items:flex-end;gap:12px;margin:9px 0 6px\"><div class=\"figbox zoomable\" style=\"flex-shrink:0;width:fit-content\"><img src=\"assets/blanking_sync.webp\" alt=\"블랭킹 동기화 타이밍\" style=\"height:230px;width:auto;display:block;\"><div class=\"zoom-hint\">🔍 휠·더블클릭 확대</div></div><p class=\"cap\" style=\"flex:1;font-size:0.8rem;word-break:keep-all;margin-top:4px;line-height:1.5;text-align:left\">←화면이 꺼지는 블랭킹 구간에만 '외광'을 측정해 누적한다.</p></div>\n\n③ 손가락 가림·그늘짐을 판단해야 한다. 모바일 환경은 사용 상태에 따라 주변광이 쉽게 변합니다. ALS는 센서를 덮거나 그림자 지는 급격한 변화를 스스로 판정해 그 값에 꼬리표를 답니다.\n\n정리하면, ALS를 품으려면 OLED는 ① 높은 투과율을 위한 화소배치·배선·캐소드·터치전극 재설계 ② 저반사 표면처리 ③ DDI와의 타이밍 연동 구동을 갖춰야 합니다. 즉 패널·터치·구동회로·센서가 한 몸처럼 연동되도록 시스템을 이해하고 설계해야 합니다.\n\n<h3 style=\"font-size:1.1rem; color:#1A2A4A; margin-top:12px; margin-bottom:10px; border-bottom:2px solid #B08A2E; padding-bottom:3px; font-weight:700;\">3. 또 다른 ALS의 이슈들</h3>\n\n<h4 style=\"font-size:1rem; color:#B08A2E; margin:8px 0 6px; font-weight:700;\">➀ POL-less OLED는 ALS를 포기해야 하는가?</h4>\n\nFlexible OLED는 CF와 BM으로 편광판을 제거하는 POL-less 기술을 도입하고 있습니다. 그런데 OLED의 유일한 투과 경로인 Anode 사이 망상공간이 POL-less에서는 BM·블랙 PDL로 모두 가려져 투과율이 사실상 zero가 됩니다.\n\n그렇다면 POL-less OLED는 ALS가 불가능할까요? 결론은 아닙니다. 저반사 광학특성(명암비·시인성)은 그대로 유지하면서, 센서 영역에서만 ALS가 쓸 만큼의 투과율을 따로 확보하는 ‘특별한 패널 구조’를 만드는 것입니다. 반사는 눌러야 하고 투과는 살려야 하는 — 정면으로 충돌하는 두 요구를 양립시켜야 하는, 아직 정답이 없는 살아 있는 연구 주제입니다.", "<div class=\"figbox zoomable\" style=\"max-width:430px; margin:5px auto 9px;\"><img src=\"assets/polless_layers.webp?v=3\" alt=\"일반 OLED와 POL-less OLED 적층 구조 비교\" style=\"width:100%;height:auto;display:block\"><div class=\"zoom-hint\">🔍 휠·더블클릭 확대</div></div>\n\n<p class=\"cap\" style=\"text-align:center;\">▲ 일반 OLED(좌)와 POL-less OLED(우) — 우측은 BM·블랙 PDL이 투과창을 차단한다</p>\n\n<h4 style=\"font-size:1rem; color:#B08A2E; margin:14px 0 6px; font-weight:700;\">➁ ALS 기능을 패널에 내장할 수는 없을까?</h4>\n\n별도의 ALS 칩을 화면 밑에 숨기느라 고생하느니, 아예 패널이 스스로 주변광을 센싱하면 어떨까요? 그나마 투과창으로 활용할 수 있는 화소와 화소 사이의 공간은 블랙PDL, Pol-less 기술, 시야각제어 기술 등이 점차 도입되면서 더이상 OLED 패널에서 투과율을 올리기 위한 노력은 어쩌면 불가능해질 지도 모릅니다.\n\n다행히 OLED 패널내에는 실제 광센서로 사용할 수 있는 LTPS/a-Si/Oxide TFT소자들이 이미 있습니다. 최근 활발히 연구되고 있는 OPD도 좋은 광센서 소자입니다. 이들를 활용하면 화면의 특정 지점이 아닌 패널 전체를 통해 주변광을 실시간으로 감지하는 정교한 밝기 제어가 가능해집니다. 나아가 별도의 센서 부품과 조립 공정도 생략할 수 있습니다. 결국, ALS를 OLED 패널에 내장하는 연구는 디스플레이 회사가 타사와 차별화할 수 있는 훌륭한 테마입니다.\n\n<div class=\"closebox reveal\"><div style=\"font-size:13px;color:#ddd5c4;line-height:1.7;word-break:keep-all\">성균관대 첨단디스플레이공학과는 다양한 각도에서 이러한 이슈들을 함께 고민하고 독창적인 솔루션을 함께 개발할 좋은 파트너입니다.<br><span style=\"color:#ffd700;font-weight:800\">첨디공의 문은 언제나 열려 있습니다.</span></div><div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:13px\"><a href=\"mailto:nackmann@skku.edu\" style=\"display:inline-block;background:#ffd700;color:#1a1a1a;font-size:12px;font-weight:800;padding:9px 16px;border-radius:6px;text-decoration:none;white-space:nowrap;animation:ctaGlow 2.2s ease-in-out infinite\">산학협력 · 공동연구 문의 (✉ nackmann@skku.edu)</a><a href=\"mailto:nackmann@skku.edu\" style=\"flex-shrink:0;text-align:center;text-decoration:none\"><img src=\"assets/contact_qr.webp\" alt=\"문의 QR\" style=\"width:52px;height:52px;background:#fff;padding:4px;border-radius:5px;display:block\"><div style=\"font-size:8px;color:#cfc7ba;margin-top:3px;white-space:nowrap\">스캔하면 메일 문의</div></a></div></div>"], "body": "첨디공 廣角노트의 첫 번째 연재테마는 OLED 패널 뒤에서 동작하는 센서들과, 이들 센서와 직간접적으로 상관관계가 있는 OLED 패널의 투과정보·연동기술을 다룹니다. 백라이트가 필요한 LCD 패널에서 투과정보를 분석하는 것은 너무나 당연하지만, 전면발광 OLED 패널을 '투과의 관점'에서 분석하는 것은 꽤나 흥미롭습니다. 우리가 미처 생각하지 못한 이슈를 발견하게 되고, 나아가 새로운 차별화 기술 개발의 시발점이 될 수 있습니다.\n\n이번 호의 주인공은 OLED 뒤에 숨은 작은 눈, ALS(조도센서)입니다.\n\n<h3 style=\"font-size:1.1rem; color:#1A2A4A; margin-top:14px; margin-bottom:10px; border-bottom:2px solid #B08A2E; padding-bottom:3px; font-weight:700; margin-top:2px;\">1. ALS란 무엇인가?</h3>\n\n<div style=\"float:right; width:118px; margin:2px 0 6px 14px;\"><div class=\"figbox zoomable\" style=\"width:100%; height:286px;\"><img src=\"assets/als_chip.webp\" alt=\"ALS 센서 실물 단면\"><div class=\"zoom-hint\" style=\"font-size:8px; padding:2px 4px;\">🔍</div></div><div class=\"cap\" style=\"text-align:center; font-size:8.5px; margin:3px 0 0;\">▲ ALS 센서 실물 단면</div></div>\n\n화면 밝기를 알아서 맞춰 주는 그 눈을 조도센서(ALS, Ambient Light Sensor)라고 부릅니다. 그런데 ALS를 '밝기만 재는 센서'로 생각하면 절반만 아는 겁니다. 사실 ALS는 작은 컬러 카메라에 가깝습니다. 요즘 behind-OLED용 ALS는 Red·Green·Blue·Clear, 즉 RGB+C 네 채널을 동시에 읽습니다.\n\n이 네 채널의 조합에서 세 가지 정보를 뽑아냅니다.\n\n- 주변 밝기(조도, lux) — Clear 채널로 빛의 양을 잰다. 어두우면 화면을 낮춰 눈을 보호·절전하고, 밝으면 화면을 키운다.\n- 색온도(CCT) — RGB 채널 비율로 '햇빛인지·형광등인지·백열등인지'를 읽어 화이트밸런스·색감을 자동 조정한다.\n- 플리커(깜빡임) — 조명이 눈에 안 보이게 깜빡이는 주파수를 읽어 카메라 줄무늬(밴딩)를 막는다.\n\n즉 ALS는 주변광의 양·색·리듬을 한꺼번에 읽는 다채널 광센서입니다. 게다가 이 눈은 원래 베젤에 앉아 있었는데, '풀스크린' 시대가 오면서 자리를 잃고 화면 밑으로(behind-OLED) 숨어들어야 했습니다. 바로 그 순간부터, 이 이야기는 센서가 아니라 OLED의 이야기가 됩니다.\n\n<!-- page -->\n\n<h3 style=\"font-size:1.1rem; color:#1A2A4A; margin-top:8px; margin-bottom:10px; border-bottom:2px solid #B08A2E; padding-bottom:3px; font-weight:700;\">2. ALS는 OLED와 어떻게 연동되는가?</h3>\n\n우리에겐 OLED가 스스로 빛을 내는 화려한 화면이지만, 그 아래 센서의 눈높이에서 보면 OLED는 여러 겹으로 쌓인 불투명한 막입니다. 외부광이 센서에 닿으려면 커버글라스·편광판·봉지막·화소층을 모두 투과해야 하는데, 화소와 금속 배선 사이 그물 같은 틈새로 새어드는 빛의 추정 투과율은 수 % 안팎에 불과합니다. 화소전극(Anode)은 전반사막이라 투과율이 zero에 가깝지만, 전극 사이 하부배선이 만든 미세한 그물망으로 빛이 새어 나갑니다. 그래서 ALS에게 가장 중요한 단어는 OLED의 투과특성입니다.\n\n<div class=\"figbox zoomable\" style=\"max-width:430px; height:223px; margin:10px auto 6px;\"><img src=\"assets/oled_refl_trans.webp\" alt=\"OLED 패널 반사·투과 이미지\"><div class=\"zoom-hint\">🔍 휠·더블클릭 확대</div></div>\n\n<p class=\"cap\" style=\"text-align:center;\">▲ 같은 OLED 패널을 반사(좌)·투과(우)로 본 실제 이미지 — 배선 사이로만 빛이 통과</p>\n\nOLED의 관점에서 보면, ALS가 풀어야 할 숙제는 셋이고, 셋 다 'OLED가 어떤 특성을 가져야 하는가'로 되돌아옵니다.\n\n① 투과 광량이 너무 약하다 → OLED는 더 투명해져야 한다. 1% 남짓의 빛으로 작동하려면 센서 감도만으론 한계가 있습니다. 화소 배치·캐소드 패턴·터치 전극 구조를 투과율이 높아지는 방향으로 설계하는 일이 OLED 개발자의 몫입니다.\n\n② OLED 빛 자체가 노이즈다. 센서 바로 위 화소는 영상에 맞춰 늘 변하는데, 이는 ALS 입장에선 최악의 잡음입니다. 그래서 디스플레이가 꺼지는 찰나(블랭킹 구간)에 맞춰 센싱해 순수 주변광만 취득합니다. 이를 위해 DDI는 발광 타이밍을 ALS에 전달해야 합니다.\n\n<!-- page -->\n\n<div style=\"display:flex;align-items:flex-end;gap:12px;margin:9px 0 6px\"><div class=\"figbox zoomable\" style=\"flex-shrink:0;width:fit-content\"><img src=\"assets/blanking_sync.webp\" alt=\"블랭킹 동기화 타이밍\" style=\"height:230px;width:auto;display:block;\"><div class=\"zoom-hint\">🔍 휠·더블클릭 확대</div></div><p class=\"cap\" style=\"flex:1;font-size:0.8rem;word-break:keep-all;margin-top:4px;line-height:1.5;text-align:left\">←화면이 꺼지는 블랭킹 구간에만 '외광'을 측정해 누적한다.</p></div>\n\n③ 손가락 가림·그늘짐을 판단해야 한다. 모바일 환경은 사용 상태에 따라 주변광이 쉽게 변합니다. ALS는 센서를 덮거나 그림자 지는 급격한 변화를 스스로 판정해 그 값에 꼬리표를 답니다.\n\n정리하면, ALS를 품으려면 OLED는 ① 높은 투과율을 위한 화소배치·배선·캐소드·터치전극 재설계 ② 저반사 표면처리 ③ DDI와의 타이밍 연동 구동을 갖춰야 합니다. 즉 패널·터치·구동회로·센서가 한 몸처럼 연동되도록 시스템을 이해하고 설계해야 합니다.\n\n<h3 style=\"font-size:1.1rem; color:#1A2A4A; margin-top:12px; margin-bottom:10px; border-bottom:2px solid #B08A2E; padding-bottom:3px; font-weight:700;\">3. 또 다른 ALS의 이슈들</h3>\n\n<h4 style=\"font-size:1rem; color:#B08A2E; margin:8px 0 6px; font-weight:700;\">➀ POL-less OLED는 ALS를 포기해야 하는가?</h4>\n\nFlexible OLED는 CF와 BM으로 편광판을 제거하는 POL-less 기술을 도입하고 있습니다. 그런데 OLED의 유일한 투과 경로인 Anode 사이 망상공간이 POL-less에서는 BM·블랙 PDL로 모두 가려져 투과율이 사실상 zero가 됩니다.\n\n<!-- page -->\n\n<div class=\"figbox zoomable\" style=\"max-width:430px; margin:5px auto 9px;\"><img src=\"assets/polless_layers.webp?v=3\" alt=\"일반 OLED와 POL-less OLED 적층 구조 비교\" style=\"width:100%;height:auto;display:block\"><div class=\"zoom-hint\">🔍 휠·더블클릭 확대</div></div>\n\n<p class=\"cap\" style=\"text-align:center;\">▲ 일반 OLED(좌)와 POL-less OLED(우) — 우측은 BM·블랙 PDL이 투과창을 차단한다</p>\n\n<h4 style=\"font-size:1rem; color:#B08A2E; margin:14px 0 6px; font-weight:700;\">➁ ALS 기능을 패널에 내장할 수는 없을까?</h4>\n\n별도의 ALS 칩을 화면 밑에 숨기느라 고생하느니, 아예 패널이 스스로 주변광을 센싱하면 어떨까요? 그나마 투과창으로 활용할 수 있는 화소와 화소 사이의 공간은 블랙PDL, Pol-less 기술, 시야각제어 기술 등이 점차 도입되면서 더이상 OLED 패널에서 투과율을 올리기 위한 노력은 어쩌면 불가능해질 지도 모릅니다.\n\n다행히 OLED 패널내에는 실제 광센서로 사용할 수 있는 LTPS/a-Si/Oxide TFT소자들이 이미 있습니다. 최근 활발히 연구되고 있는 OPD도 좋은 광센서 소자입니다. 이들를 활용하면 화면의 특정 지점이 아닌 패널 전체를 통해 주변광을 실시간으로 감지하는 정교한 밝기 제어가 가능해집니다. 나아가 별도의 센서 부품과 조립 공정도 생략할 수 있습니다. 결국, ALS를 OLED 패널에 내장하는 연구는 디스플레이 회사가 타사와 차별화할 수 있는 훌륭한 테마입니다.\n\n<div class=\"closebox reveal\"><div style=\"font-size:13px;color:#ddd5c4;line-height:1.7;word-break:keep-all\">성균관대 첨단디스플레이공학과는 다양한 각도에서 이러한 이슈들을 함께 고민하고 독창적인 솔루션을 함께 개발할 좋은 파트너입니다.<br><span style=\"color:#ffd700;font-weight:800\">첨디공의 문은 언제나 열려 있습니다.</span></div><div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:13px\"><a href=\"mailto:nackmann@skku.edu\" style=\"display:inline-block;background:#ffd700;color:#1a1a1a;font-size:12px;font-weight:800;padding:9px 16px;border-radius:6px;text-decoration:none;white-space:nowrap;animation:ctaGlow 2.2s ease-in-out infinite\">산학협력 · 공동연구 문의 (✉ nackmann@skku.edu)</a><a href=\"mailto:nackmann@skku.edu\" style=\"flex-shrink:0;text-align:center;text-decoration:none\"><img src=\"assets/contact_qr.webp\" alt=\"문의 QR\" style=\"width:52px;height:52px;background:#fff;padding:4px;border-radius:5px;display:block\"><div style=\"font-size:8px;color:#cfc7ba;margin-top:3px;white-space:nowrap\">스캔하면 메일 문의</div></a></div></div>"};

function buildAccHTML(grouped,isConf){
  let html='';
  Object.keys(grouped).sort().forEach(key=>{
    const items=grouped[key];
    const id='ac'+Math.random().toString(36).slice(2,8);
    html+=`<div><div class="acc-hdr" onclick="toggleAcc('${id}')">
      <span>${key}</span>
      <span style="display:flex;align-items:center;gap:8px">
        <span style="font-size:14px;font-weight:700;color:#111">${items.length}건</span>
        <span id="arr_${id}" style="font-size:10px;color:#aaa;transition:transform .2s">▼</span>
      </span>
    </div><div class="acc-body" id="${id}">`;
    items.forEach(item=>{
      const meta=isConf?`발표자: ${item.presenter} · ${item.conf} · ${item.date}`:`${item.journal} · ${item.issue} · ${item.date}`;
      const badge=isConf
        ?`<span style="font-size:8px;padding:1px 5px;background:#e6f4ea;color:#1a7a3a;border-radius:3px;border:1px solid #a8d8b8;flex-shrink:0;margin-top:2px">발표</span>`
        :`<span style="font-size:8px;padding:1px 5px;background:#e8f0fb;color:#1a56a0;border-radius:3px;border:1px solid #b3ccf0;flex-shrink:0;margin-top:2px">SCIE</span>`;
      const titleEl=isConf
        ?`<span style="font-size:10px;font-weight:600;color:#333;line-height:1.4;word-break:break-word">${item.title}</span>`
        :`<a href="https://scholar.google.com/scholar?q=${encodeURIComponent(item.title)}" target="_blank" style="font-size:10px;font-weight:600;color:#1a56a0;text-decoration:none;line-height:1.4;word-break:break-word">${item.title}</a>`;
      html+=`<div class="acc-row"><div style="display:flex;gap:4px;align-items:flex-start;margin-bottom:2px">${badge}${titleEl}</div><div style="font-size:9px;color:#888;padding-left:25px;line-height:1.4">${meta}</div></div>`;
    });
    html+=`</div></div>`;
  });
  return html;
}

function mdToParas(md){
  return md.split(/\n\s*\n/).map(p=>{
    const t=p.trim();
    if(!t) return '';
    const html=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
    return /^</.test(t) ? html : `<p>${html}</p>`;
  }).join('');
}

function bFullPhoto(photo){

// 제목형: 페이지 헤더(라벨+제목) 고정 + 아래 사진 가득
function bTitledPhoto(photo){
  const fit = photo.fit==='contain' ? ' fit-contain' : '';
  const safe = (photo.caption||'').replace(/['"\\]/g,'');
  const label = (photo.label!==undefined ? photo.label : (META.quarter_label||''));
  const cap = photo.caption ? `<div class="fp-cap">${photo.caption}</div>` : '';
  return `<div class="bp" style="display:flex;flex-direction:column;overflow:hidden">

    <div class="photo-fill zoomable${fit}">
      <img src="${ASSETS}${photo.image}" alt="${safe||photo.title}" onerror="this.parentElement.style.background='#f7f5f0';this.style.display='none'">
      <div class="zoom-hint">🔍 휠·더블클릭 확대</div>${cap}

  </div>`;
}
// 전체 가득형 (표준 5:7, 헤더 없이 한 면 꽉)
function bBleedPhoto(photo){
  const fit = photo.fit==='contain' ? ' fit-contain' : '';
  const safe = (photo.caption||'').replace(/['"\\]/g,'');
  const cap = photo.caption ? `<div class="fp-cap">${photo.caption}</div>` : '';
  return `<div class="full-photo zoomable${fit}">
    <img src="${ASSETS}${photo.image}" alt="${safe||'사진'}" onerror="this.parentElement.style.background='#fdf9f3';this.style.display='none'">

}

      <h2 style="font-size:1.5rem;line-height:1.3;flex:1;min-width:0">${COVER_STORY.title.replace(/ /g,'<br>')}</h2>
      <img src="${ASSETS}${COVER_STORY.image}" alt="${COVER_STORY.title}" style="width:55%;aspect-ratio:16/9;object-fit:cover;border-radius:7px;flex-shrink:0;box-shadow:0 3px 12px rgba(0,0,0,.18)" onerror="this.style.display='none'">
    </div>
    <div class="dt"></div>
    <div class="body-txt">${mdToParas(COVER_STORY.body)}</div>
    <div class="bpg ${pageNum%2===0?'bpg-l':'bpg-r'}">${String(pageNum).padStart(2,'0')}</div>
  </div>`;
}

// ═══════════ 평면 페이지 목록 (표지·뒤표지 제외) ═══════════
const flatPages = [];
if (INTROS && INTROS.length >= 2) {
  flatPages.push('p04','p05','p03');
} else {
  flatPages.push('p03');
}
if (FEATURED_PAPER) flatPages.push('fp1','fp2','fp3','fp4');
if (AI_TECH) flatPages.push('ai1', 'ai2', 'ai3');
if (hasMultiCS) {
  COVER_STORY.pages.forEach((_,idx)=>flatPages.push('cs'+(idx+1)));
} else {
  flatPages.push('cs1');
}
if (INTROS && INTROS.length >= 4) { for(let k=2;k<INTROS.length;k++) flatPages.push('prof'+(k-1)); }
flatPages.push('status','events');
flatPages.push('p06','p07','p08');
PHOTOS.forEach((ph,i)=>{bBuilders['photo'+i]=bFullPhoto(ph);flatPages.push('photo'+i);});

// ═══════════ spreads 구성 ═══════════
const spreads=[{label:'표지  p.01',left:null,right:'cf'}];
for(let i=0;i<flatPages.length;i+=2){
  const lk=flatPages[i],rk=(i+1<flatPages.length)?flatPages[i+1]:'blank';
  const ln=String(i+2).padStart(2,'0'),rn=String(i+3).padStart(2,'0');
  spreads.push({label:`pp. ${ln}–${rn}`,left:lk,right:rk});
}
spreads.push({label:'뒤표지',left:'cb',right:null});

/* ══ 칼럼별 시각 구분 — 라벨·상단바 칼럼 고유색 틴팅 ══ */
const COL_ACCENT=[['廣角','#B08A2E'],['광각','#B08A2E'],['이달의 논문','#C0392B'],['Display Tech','#1A56A0'],['연구실','#1A7A4A'],['인사말','#2C3E70'],['축사','#2C3E70'],['1분기','#5B6770'],['학과 현황','#5B6770'],['학과 주요 행사','#5B6770']];
const EDGE_COLS=['廣角','광각','이달의 논문','Display Tech','연구실'];  // 엣지 인덱스 적용 칼럼(인사말·축사·실적·현황/행사 제외)
function accentFor(t){if(!t)return null;for(const[k,c]of COL_ACCENT){if(t.indexOf(k)>=0)return c;}return null;}
function isEdgeCol(t){if(!t)return false;for(const k of EDGE_COLS){if(t.indexOf(k)>=0)return true;}return false;}
function tintColumns(root){
  root.querySelectorAll('.db').forEach(db=>{
    let accent=null,matched='',sib=db.nextElementSibling,hops=0;
    while(sib&&hops<3&&!accent){const t=(sib.textContent||'').trim();if(t.length<60){accent=accentFor(t);if(accent)matched=t;}sib=sib.nextElementSibling;hops++;}
    if(!accent)return;
    db.style.background=accent;
    const page=db.parentElement;if(!page)return;
    page.querySelectorAll('.label').forEach(l=>l.style.color=accent);
    page.querySelectorAll('span,div').forEach(s=>{if(s.style&&/rgb\(217,\s*48,\s*37\)/.test(s.style.color))s.style.color=accent;});
    page.querySelectorAll('.bpg').forEach(b=>{b.style.background=accent;});
    if(isEdgeCol(matched)){
      const box=db.closest('.page-left, .page-right');
      if(box&&!box.querySelector('.edge-idx')){
        const side=box.classList.contains('page-right')?'right':'left';
        const bar=document.createElement('div');bar.className='edge-idx';
        bar.style.cssText='position:absolute;top:0;'+side+':0;width:7px;height:72px;background:'+accent+';z-index:4;border-radius:0 0 3px 3px';
        box.appendChild(bar);
      }
    }
  });
}

let cur=0;
const spreadEl=document.getElementById('spread');
const dotsEl=document.getElementById('book-dots');
spreads.forEach((_,i)=>{
  const d=document.createElement('button');
  d.className='book-dot'+(i===0?' active':'');
  d.onclick=()=>jump(i);
  dotsEl.appendChild(d);
});

function renderSpread(i){
  const s=spreads[i];let html='';
  if(s.left===null) html=`<div class="page-placeholder"></div><div class="spine"></div>${bBuilders[s.right](1)}`;
  else if(s.right===null) html=`${bBuilders[s.left](2 * i)}<div class="spine"></div><div class="page-placeholder-r"></div>`;
  else html=`<div class="page-left">${bBuilders[s.left](2 * i)}</div><div class="spine"></div><div class="page-right">${bBuilders[s.right](2 * i + 1)}</div>`;
  spreadEl.innerHTML=html;
  tintColumns(spreadEl);
  spreadEl.querySelectorAll('.reveal').forEach(e=>requestAnimationFrame(()=>requestAnimationFrame(()=>e.classList.add('in'))));
  spreadEl.querySelectorAll('.zoomable').forEach(attachInplaceZoom);
  document.getElementById('book-spread-info').textContent=s.label;
  document.getElementById('b-btn-prev').disabled=i===0;
  document.getElementById('b-btn-next').disabled=i===spreads.length-1;
  document.getElementById('s-btn-prev').disabled=i===0;
  document.getElementById('s-btn-next').disabled=i===spreads.length-1;
  document.querySelectorAll('.book-dot').forEach((d,idx)=>d.classList.toggle('active',idx===i));
}
function jump(i){cur=i;renderSpread(i);}
function bookGo(d){jump(Math.min(Math.max(cur+d,0),spreads.length-1));}

function toggleFS(){
  const b=document.getElementById('btn-fs');
  if(!document.fullscreenElement&&!document.webkitFullscreenElement){
    const el=document.documentElement;
    if(el.requestFullscreen)el.requestFullscreen();
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
    b.textContent='종료';
  }else{
    if(document.exitFullscreen)document.exitFullscreen();
    else if(document.webkitExitFullscreen)document.webkitExitFullscreen();
    b.textContent='전체화면';
  }
}
document.addEventListener('fullscreenchange',()=>{const b=document.getElementById('btn-fs');if(b)b.textContent=document.fullscreenElement?'종료':'전체화면';});
document.addEventListener('webkitfullscreenchange',()=>{const b=document.getElementById('btn-fs');if(b)b.textContent=document.webkitFullscreenElement?'종료':'전체화면';});

function toggleAcc(id){
  const b=document.getElementById(id),arr=document.getElementById('arr_'+id);
  if(!b)return;
  const open=b.classList.toggle('open');
  if(arr)arr.style.transform=open?'rotate(180deg)':'';
  const hdr=b.previousElementSibling;
  if(hdr)hdr.style.borderRadius=open?'7px 7px 0 0':'7px';
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') bookGo(1);
  else if(e.key==='ArrowLeft') bookGo(-1);
});

/* ══ 제자리 확대(인플레이스 줌) — 팝업 없이 페이지 액자 안에서 확대 ══ */
function attachInplaceZoom(box){
  const img=box.querySelector('img'); if(!img) return;
  let scale=1, tx=0, ty=0, panning=false, sx=0, sy=0;
  const MAX=5;
  function clamp(){ const W=box.clientWidth,H=box.clientHeight;
    tx=Math.min(0,Math.max(-(scale-1)*W,tx)); ty=Math.min(0,Math.max(-(scale-1)*H,ty)); }
  function apply(){ clamp(); img.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
    box.classList.toggle('zoomed',scale>1.01); }
  function zoomAt(px,py,ns){ ns=Math.max(1,Math.min(ns,MAX));
    tx=px-(px-tx)*(ns/scale); ty=py-(py-ty)*(ns/scale); scale=ns; img.style.transition='none'; apply(); }
  function reset(){ img.style.transition='transform .2s ease-out'; scale=1; tx=0; ty=0; apply(); }
  // 데스크탑: 휠 줌 · 드래그 이동 · 더블클릭 토글
  box.addEventListener('wheel',e=>{ e.preventDefault(); const r=box.getBoundingClientRect();
    zoomAt(e.clientX-r.left,e.clientY-r.top,scale*(e.deltaY<0?1.2:0.83)); },{passive:false});
  box.addEventListener('mousedown',e=>{ if(scale<=1)return; panning=true; img.style.transition='none';
    sx=e.clientX-tx; sy=e.clientY-ty; e.preventDefault(); });
  window.addEventListener('mousemove',e=>{ if(!panning)return; tx=e.clientX-sx; ty=e.clientY-sy; apply(); });
  window.addEventListener('mouseup',()=>{ panning=false; });
  box.addEventListener('dblclick',e=>{ const r=box.getBoundingClientRect();
    if(scale>1) reset(); else zoomAt(e.clientX-r.left,e.clientY-r.top,2.4); });
  // 터치(터치스크린 노트북 등): 핀치 줌 · 1손가락 이동(확대 상태) · 더블탭
  let pinchD=0,pStart=1,pcx=0,pcy=0,lastT=null,lastTap=0;
  const dist=t=>Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
  box.addEventListener('touchstart',e=>{
    if(e.touches.length===2){ const r=box.getBoundingClientRect(); pinchD=dist(e.touches); pStart=scale;
      pcx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left; pcy=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top; }
    else if(e.touches.length===1){ const now=Date.now();
      if(now-lastTap<300){ const r=box.getBoundingClientRect();
        if(scale>1) reset(); else zoomAt(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top,2.4); } lastTap=now;
      if(scale>1) lastT={x:e.touches[0].clientX-tx,y:e.touches[0].clientY-ty}; }
  },{passive:false});
  box.addEventListener('touchmove',e=>{
    if(e.touches.length===2){ e.preventDefault(); zoomAt(pcx,pcy,pStart*(dist(e.touches)/pinchD)); }
    else if(e.touches.length===1&&scale>1&&lastT){ e.preventDefault();
      tx=e.touches[0].clientX-lastT.x; ty=e.touches[0].clientY-lastT.y; apply(); }
  },{passive:false});
}

renderSpread(0);
</script>
