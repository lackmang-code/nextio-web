<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>첨디공 ON — 창간호 (발행 전 검토용)</title>
<script>
/* 기기 분기: 모바일이면 phone.html, 그 외에는 book.html 로 자동 이동 */
(function(){
  var ua = navigator.userAgent || '';
  var w  = Math.min(screen.width || 9999, window.innerWidth || 9999);
  var mobile = /Mobi|Android|iPhone|iPad|iPod/i.test(ua) || w < 820;
  location.replace(mobile ? 'phone.html' : 'book.html');
})();
</script>
</head>
<body style="font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#c8bfb0;margin:0;padding:24px;color:#222">
  <p style="max-width:560px;margin:40px auto;text-align:center;line-height:1.7">
    매거진을 여는 중입니다…<br>
    자동으로 넘어가지 않으면 아래를 눌러 주세요.<br><br>
    <a href="book.html" style="display:inline-block;margin:6px;padding:10px 18px;background:#1a1a1a;color:#ffd700;border-radius:6px;text-decoration:none;font-weight:700">💻 PC용 펼침면</a>
    <a href="phone.html" style="display:inline-block;margin:6px;padding:10px 18px;background:#1a1a1a;color:#ffd700;border-radius:6px;text-decoration:none;font-weight:700">📱 모바일용</a>
  </p>
</body>
</html>
