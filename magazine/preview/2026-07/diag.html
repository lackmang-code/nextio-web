<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>회전 진단</title>
<style>
  body{font-family:'Apple SD Gothic Neo',sans-serif;padding:20px;font-size:16px;line-height:1.9;color:#222;background:#fdf9f3}
  h2{color:#1B2D6B}
  .v{color:#C0392B;font-weight:800}
  #out{background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px 16px;margin:12px 0}
  .verdict{font-size:22px;font-weight:800;color:#1B2D6B}
  button{padding:12px 20px;font-size:16px;font-weight:700;background:#1B2D6B;color:#fff;border:0;border-radius:8px}
</style>
</head>
<body>
<h2>📱 회전 진단</h2>
<p>휴대폰을 <b>① 세로</b>로 → <b>② 가로</b>로 돌려보고, <b>③ 전체화면</b> 버튼도 눌러보면서<br>
아래 값들이 각각 어떻게 바뀌는지 알려 주세요. (값이 실시간으로 갱신됩니다)</p>
<div id="out"></div>
<button onclick="fs()">전체화면 토글</button>
<script>
function read(){
  var so = screen.orientation || {};
  var land = window.matchMedia('(orientation:landscape)').matches;
  var fsOn = !!(document.fullscreenElement || document.webkitFullscreenElement);
  var html = '';
  html += 'screen.orientation.type : <span class="v">' + (so.type || '(없음)') + '</span><br>';
  html += 'screen.orientation.angle : <span class="v">' + (so.angle !== undefined ? so.angle : '(없음)') + '</span><br>';
  html += 'window.orientation : <span class="v">' + (typeof window.orientation === 'number' ? window.orientation : '(없음)') + '</span><br>';
  html += 'innerWidth × innerHeight : <span class="v">' + window.innerWidth + ' × ' + window.innerHeight + '</span><br>';
  html += 'matchMedia(landscape) : <span class="v">' + land + '</span><br>';
  html += '전체화면(fullscreen) : <span class="v">' + fsOn + '</span>';
  html += '<hr>현재 코드(뷰포트 비율) 판정 : <span class="verdict">' + (land ? '가로 → 경고 표시' : '세로 → 정상') + '</span>';
  document.getElementById('out').innerHTML = html;
}
['resize','orientationchange','fullscreenchange','webkitfullscreenchange'].forEach(function(e){ window.addEventListener(e, read); });
if (screen.orientation && screen.orientation.addEventListener) screen.orientation.addEventListener('change', read);
function fs(){
  var el = document.documentElement;
  if (!(document.fullscreenElement || document.webkitFullscreenElement)) {
    (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  }
  setTimeout(read, 350);
}
read();
</script>
</body>
</html>
