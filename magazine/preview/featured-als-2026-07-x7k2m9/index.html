<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>[검토용] 이달의 논문 — 첨디공 ON 창간호</title>
<script>
/* 기기 분기: 모바일이면 m.html, 그 외에는 pc.html 로 자동 이동(최상위 문서) */
(function(){
  var ua = navigator.userAgent || '';
  var w  = Math.min(screen.width || 9999, window.innerWidth || 9999);
  var mobile = /Mobi|Android|iPhone|iPad|iPod/i.test(ua) || w < 820;
  var v = '?v=' + Date.now();   /* 캐시 우회 */
  location.replace((mobile ? 'm.html' : 'pc.html') + v);
})();
</script>
</head>
<body style="font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#c8bfb0;margin:0;padding:24px;color:#222">
  <p style="max-width:560px;margin:40px auto;text-align:center;line-height:1.7">
    이달의 논문 검토본을 여는 중입니다…<br>
    자동으로 넘어가지 않으면 아래를 눌러 주세요.<br><br>
    <a href="pc.html" style="display:inline-block;margin:6px;padding:10px 18px;background:#1a1a1a;color:#ffd700;border-radius:6px;text-decoration:none;font-weight:700">💻 PC용 펼침면</a>
    <a href="m.html" style="display:inline-block;margin:6px;padding:10px 18px;background:#1a1a1a;color:#ffd700;border-radius:6px;text-decoration:none;font-weight:700">📱 모바일용</a>
  </p>
